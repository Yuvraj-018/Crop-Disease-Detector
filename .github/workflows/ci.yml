name: CropGuard CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff black
      - run: ruff check backend/app/
      - run: black --check backend/app/

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4-alpine
        env:
          POSTGRES_USER: cropguard
          POSTGRES_PASSWORD: cropguard
          POSTGRES_DB: cropguard_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r backend/requirements.dev.txt
      - run: pytest backend/tests/ -v
        env:
          DATABASE_URL: postgresql+asyncpg://cropguard:cropguard@localhost:5432/cropguard_test
          SECRET_KEY: test-secret-key-minimum-32-characters-long
          REDIS_URL: redis://localhost:6379/0

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend

  frontend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-lint, backend-test, frontend-typecheck, frontend-lint]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build
