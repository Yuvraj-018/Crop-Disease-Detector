version: '3.9'

networks:
  cropguard_network:
    driver: bridge

volumes:
  cropguard_postgres_data:
  cropguard_redis_data:

services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cropguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cropguard}
      POSTGRES_DB: ${POSTGRES_DB:-cropguard}
    volumes:
      - cropguard_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cropguard_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cropguard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - cropguard_redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cropguard_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: ${REDIS_URL}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:5173"]}
      ENVIRONMENT: development
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cropguard_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_URL: ${REDIS_URL}
      ENVIRONMENT: development
      WATCHFILES_FORCE_POLLING: "true"
    depends_on:
      - backend
      - redis
    networks:
      - cropguard_network
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q predictions

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - cropguard_network
